spring.application.name=authentication-service

# JPA común
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JWT (defaults SOLO para dev)
app.jwt.secret=${JWT_SECRET:change-me-in-production}
app.jwt.access-token-ttl-seconds=${JWT_TTL_SECONDS:3600}
app.jwt.refresh-token-ttl-seconds=${JWT_REFRESH_TTL_SECONDS:604800}

# CORS
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000}

# RabbitMQ (opcional)
spring.rabbitmq.listener.simple.auto-startup=false
